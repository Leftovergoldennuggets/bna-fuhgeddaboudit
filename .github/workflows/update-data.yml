# =============================================================================
# update-data.yml — Automated quarterly data refresh
# =============================================================================
# This workflow downloads the latest NHTSA + Waymo crash data, runs the
# processing pipeline, and commits any updated JSON files to the repository.
#
# Triggers:
#   - Manual: Click "Run workflow" in GitHub Actions
#   - Scheduled: March 15, June 15, September 15, December 15 (quarterly)
#
# What gets committed:
#   - data/web/*.json (site statistics, crash data, serious incidents)
#   - site/assets/images/*.png (chart images generated by matplotlib)
#
# If the pipeline detects no data changes, no commit is created.
# =============================================================================

name: Update Crash Data

on:
  # Manual trigger (run anytime from the Actions tab)
  workflow_dispatch:

  # Quarterly schedule (Waymo releases ~Dec 15, Mar 15, Jun 15, Sep 15)
  # Runs at 10:00 AM UTC on the 15th of Mar, Jun, Sep, Dec
  # For this part we consulted Claude who recommended cron scheduling for quarterly
  # automation. The cron syntax "0 10 15 3,6,9,12 *" has five fields:
  # ┌─── minute (0)          = at the top of the hour
  # │ ┌─── hour (10)         = 10 AM UTC
  # │ │ ┌─── day of month (15) = the 15th
  # │ │ │ ┌─── month (3,6,9,12) = March, June, September, December
  # │ │ │ │ ┌─── day of week (*) = any day
  # This runs the pipeline four times a year, timed to when Waymo publishes new data.
  schedule:
    - cron: "0 10 15 3,6,9,12 *"

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout the repository ---
      # uses: actions/checkout@v4 downloads your repo code onto the GitHub runner.
      # Every workflow needs this — otherwise the runner has an empty folder.
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Set up Python ---
      # uses: actions/setup-python@v5 installs Python on the runner.
      # cache: "pip" saves downloaded packages between runs so it's faster next time.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # --- Install dependencies ---
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # --- Run the full data pipeline ---
      # This downloads new data, merges, computes stats, generates map data
      - name: Run data pipeline
        run: python pipeline/run_pipeline.py

      # --- Check if anything changed ---
      # If the new data is identical to what's already committed, skip the commit.
      # The >> "$GITHUB_OUTPUT" syntax writes a variable that later steps can read.
      # It's how one step passes information to another step (like "did data change?").
      - name: Check for data changes
        id: check-changes
        run: |
          git add data/web/ site/assets/images/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes detected — will commit."
          fi

      # --- Commit and push updated files ---
      # if: this step only runs when the condition is true (data actually changed).
      # Without this, we'd create empty commits every quarter when nothing changed.
      - name: Commit updated data
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update: refresh crash data from NHTSA + Waymo Hub"
          git push
