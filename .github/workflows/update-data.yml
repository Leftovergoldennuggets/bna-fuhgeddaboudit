# =============================================================================
# update-data.yml — Automated quarterly data refresh
# =============================================================================
# This workflow downloads the latest NHTSA + Waymo crash data, runs the
# processing pipeline, and commits any updated JSON files to the repository.
#
# Triggers:
#   - Manual: Click "Run workflow" in GitHub Actions
#   - Scheduled: March 15, June 15, September 15, December 15 (quarterly)
#
# What gets committed:
#   - data/web/*.json (site statistics, crash data, serious incidents)
#   - site/assets/images/*.png (chart images generated by matplotlib)
#
# If the pipeline detects no data changes, no commit is created.
# =============================================================================

name: Update Crash Data

on:
  # Manual trigger (run anytime from the Actions tab)
  workflow_dispatch:

  # Quarterly schedule (Waymo releases ~Dec 15, Mar 15, Jun 15, Sep 15)
  # Runs at 10:00 AM UTC on the 15th of Mar, Jun, Sep, Dec
  schedule:
    - cron: "0 10 15 3,6,9,12 *"

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout the repository ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Set up Python ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # --- Install dependencies ---
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # --- Run the full data pipeline ---
      # This downloads new data, merges, computes stats, generates map data
      - name: Run data pipeline
        run: python pipeline/run_pipeline.py

      # --- Check if anything changed ---
      # If the new data is identical to what's already committed, skip the commit
      - name: Check for data changes
        id: check-changes
        run: |
          git add data/web/ site/assets/images/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes detected — will commit."
          fi

      # --- Commit and push updated files ---
      - name: Commit updated data
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update: refresh crash data from NHTSA + Waymo Hub"
          git push
