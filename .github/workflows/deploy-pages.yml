# =============================================================================
# deploy-pages.yml — Deploy the website to GitHub Pages
# =============================================================================
# This workflow builds a deployable version of the site and publishes it
# to GitHub Pages. It runs automatically after the data-update workflow
# finishes, and also whenever site files or data are pushed to main.
#
# Why a separate build step?
#   Locally, the site lives in site/ and loads data from ../data/web/.
#   GitHub Pages needs everything under one directory. This workflow
#   copies both into a flat _site/ folder so all paths work.
#
# The published site URL will be:
#   https://<username>.github.io/bna-fuhgeddaboudit/
# =============================================================================

name: Deploy to GitHub Pages

on:
  # For this part we consulted Claude who recommended workflow chaining — making this
  # deploy workflow trigger automatically after the data-update workflow finishes.
  # Instead of manually deploying after every data update, GitHub Actions watches for
  # the "Update Crash Data" workflow to complete and then kicks off this deployment.
  # This creates a two-stage automated pipeline: (1) update data → (2) deploy site.
  # Run after the data-update workflow completes
  workflow_run:
    workflows: ["Update Crash Data"]
    types: [completed]

  # Run when site files or data are pushed to main
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/web/**"

  # Manual trigger
  workflow_dispatch:

# Grant permissions to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time (cancel any in-progress deployment)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # uses: actions/checkout@v4 downloads your repo (same as in update-data.yml)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build the deployable site structure:
      #   _site/
      #   ├── index.html, about.html, methodology.html, faq.html
      #   ├── css/styles.css
      #   ├── js/*.js
      #   ├── assets/images/*.png
      #   └── data/web/*.json      ← data files moved here
      #
      # The JS data-loader detects GitHub Pages and adjusts paths automatically.
      - name: Build site
        run: |
          mkdir -p _site
          # Copy all site files
          cp -r site/* _site/
          # Copy data files into the site directory
          mkdir -p _site/data/web
          cp data/web/*.json _site/data/web/
          # Copy static data files (mileage milestones, miles by city)
          mkdir -p _site/data/static
          cp data/static/*.json _site/data/static/ 2>/dev/null || true

      # uses: actions/configure-pages@v4 tells GitHub Pages about our site settings
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # uses: actions/upload-pages-artifact@v3 packages the _site/ folder
      # and uploads it so the deploy step can publish it
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # uses: actions/deploy-pages@v4 takes the uploaded artifact and
      # publishes it to your GitHub Pages URL
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
